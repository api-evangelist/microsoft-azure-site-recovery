name: Azure Site Recovery
description: >-
  Azure Site Recovery REST API provides management of disaster recovery for
  Azure VMs, on-premises VMs, and physical servers. It supports configuring
  replication, running test failovers, executing planned and unplanned failovers,
  and managing recovery plans.
